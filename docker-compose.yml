## ============================================================
## [F:ROOT.05] 10x Social Media - Docker Compose
## ============================================================
## Services: Postiz App + PostgreSQL + Redis (3 containers only)
## Temporal runs on Temporal Cloud (no self-hosted containers)
## Auth handled by Composio (no platform developer apps needed)
##
## Ports exposed:
##   - 4200  → Postiz Web UI
##
## Usage:
##   docker compose up -d
##   docker compose down
##   docker compose logs -f postiz
##
## Migration to remote server:
##   1. Change POSTIZ_BASE_URL in .env to your domain
##   2. Update MAIN_URL, FRONTEND_URL, NEXT_PUBLIC_BACKEND_URL
##   3. Put a reverse proxy (Nginx/Caddy) in front with SSL
##   4. docker compose up -d
##   5. Skills & commands work unchanged
## ============================================================

services:
  # ── Postiz Application ──────────────────────────────────────
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postiz:postiz_secret@postiz-postgres:5432/postiz
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:3000
      IS_GENERAL: "true"
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
      ## ── Temporal Cloud connection ──
      TEMPORAL_ADDRESS: ${TEMPORAL_ADDRESS}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TLS: "true"
      TEMPORAL_API_KEY: ${TEMPORAL_API_KEY}
    ports:
      - "${POSTIZ_PORT:-4200}:5000"
    volumes:
      - postiz-config:/config
      - postiz-uploads:/uploads
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
    networks:
      - postiz-network

  # ── PostgreSQL ──────────────────────────────────────────────
  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: postiz_secret
      POSTGRES_DB: postiz
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - postiz-network

  # ── Redis ───────────────────────────────────────────────────
  postiz-redis:
    image: redis:7.2-alpine
    container_name: postiz-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - postiz-network

volumes:
  postgres-data:
  redis-data:
  postiz-config:
  postiz-uploads:

networks:
  postiz-network:
    driver: bridge
